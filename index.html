<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 职场嘴替工具箱 - 告别尴尬，AI 帮你说话</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', '"Noto Sans SC"', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    /* ========== 全局基础样式 ========== */
    body {
      background-color: #F9FAFB;
      min-height: 100vh;
    }

    /* ========== 每日金句横幅动画 ========== */
    .quote-banner {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      animation: bannerFadeIn 0.6s ease-out;
    }
    @keyframes bannerFadeIn {
      from { opacity: 0; transform: translateY(-100%); }
      to { opacity: 1; transform: translateY(0); }
    }
    .quote-banner.closing {
      animation: bannerFadeOut 0.4s ease-in forwards;
    }
    @keyframes bannerFadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-100%); }
    }

    /* ========== 场景按钮样式 ========== */
    .scene-btn {
      transition: all 0.2s ease;
    }
    .scene-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
    }
    .scene-btn.active {
      background-color: #4F46E5;
      color: white;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
    .scene-btn.active:hover {
      background-color: #4338CA;
    }

    /* ========== 示例按钮样式 ========== */
    .example-btn {
      transition: all 0.15s ease;
    }
    .example-btn:hover {
      background-color: #EEF2FF;
      border-color: #4F46E5;
      color: #4F46E5;
    }

    /* ========== 生成按钮脉冲动画 ========== */
    .generate-btn:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
    }
    .generate-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* ========== Loading 动画（H5 修复：改用 JS 控制） ========== */

    /* ========== 话术展示区打字光标 ========== */
    .typing-cursor::after {
      content: '|';
      animation: blink 1s step-end infinite;
      color: #4F46E5;
      font-weight: bold;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ========== 话术卡片淡入 ========== */
    .result-card {
      animation: cardFadeIn 0.3s ease-out;
    }
    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== 自定义场景输入框 ========== */
    .custom-scene-input {
      transition: all 0.3s ease;
      overflow: hidden;
    }

    /* ========== 滚动条美化 ========== */
    textarea::-webkit-scrollbar {
      width: 6px;
    }
    textarea::-webkit-scrollbar-track {
      background: #F3F4F6;
      border-radius: 3px;
    }
    textarea::-webkit-scrollbar-thumb {
      background: #D1D5DB;
      border-radius: 3px;
    }
    textarea::-webkit-scrollbar-thumb:hover {
      background: #9CA3AF;
    }

    /* ========== 复制成功提示 ========== */
    .copy-toast {
      animation: toastIn 0.3s ease-out;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ========== 网络状态提示条 ========== */
    .network-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      padding: 8px 16px;
      text-align: center;
      font-size: 13px;
      color: white;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }
    .network-bar.offline {
      background-color: #DC2626;
      transform: translateY(0);
    }
    .network-bar.online {
      background-color: #16A34A;
      transform: translateY(0);
    }

    /* ========== 按钮切换 scale 动画（补充：开启硬件加速） ========== */
    .scene-btn, #toneButtons button {
      will-change: transform;
    }
    .btn-scale-anim {
      animation: btnScale 0.15s ease-out;
    }
    @keyframes btnScale {
      from { transform: scale(0.95); }
      to { transform: scale(1); }
    }

    /* ========== 热门场景排行卡片 ========== */
    .stats-card {
      background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
      border: 1px solid #C7D2FE;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 12px;
    }
    .stats-card .stats-toggle {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      color: #4338CA;
      font-weight: 500;
    }
    .stats-card .stats-toggle .arrow {
      transition: transform 0.2s ease;
      font-size: 10px;
    }
    .stats-card .stats-toggle .arrow.collapsed {
      transform: rotate(-90deg);
    }
    .stats-card .stats-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    .stats-card .stats-list.collapsed {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }
    .stats-card .stats-list:not(.collapsed) {
      max-height: 200px;
      opacity: 1;
    }
    .stats-card .stats-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #4338CA;
      padding: 2px 0;
    }
    .stats-card .stats-item .rank {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .stats-card .stats-item .rank.gold { background: #FBBF24; color: #78350F; }
    .stats-card .stats-item .rank.silver { background: #D1D5DB; color: #374151; }
    .stats-card .stats-item .rank.bronze { background: #FCD34D; color: #78350F; }
    .stats-card .stats-item .count {
      margin-left: auto;
      background: #C7D2FE;
      color: #3730A3;
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
    }

    /* ========== 点赞按钮 ========== */
    .like-btn {
      transition: all 0.2s ease;
    }
    .like-btn.liked {
      color: #DC2626 !important;
      border-color: #FCA5A5 !important;
      background-color: #FEF2F2 !important;
    }
    .like-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }


    /* ========== 场景征集区域 ========== */
    .suggest-area {
      background: #F9FAFB;
      border: 1px dashed #D1D5DB;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .suggest-area input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .suggest-area input:focus {
      border-color: #4F46E5;
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
    }

    /* ========== Toast 提示 ========== */
    .custom-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1F2937;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .custom-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ========== 错误提示文字 ========== */
    .error-message {
      color: #DC2626;
      font-size: 13px;
      padding: 8px 12px;
      background: #FEF2F2;
      border-radius: 8px;
      border: 1px solid #FECACA;
    }
  </style>
</head>
<body class="font-sans text-gray-800">

  <!-- ================================================================
       网络状态提示条
       ================================================================ -->
  <div id="networkBar" class="network-bar" role="alert" aria-live="assertive">
    <span id="networkBarText"></span>
  </div>

  <!-- ================================================================
       每日金句横幅
       ================================================================ -->
  <div id="quoteBanner" class="quote-banner text-white py-3 px-4 text-center text-sm relative">
    <button id="closeQuoteBtn" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/70 hover:text-white transition-colors text-lg leading-none" aria-label="关闭金句横幅">&times;</button>
    <span class="mr-2">💬</span>
    <span id="quoteText" class="inline-block max-w-[90%]"></span>
  </div>

  <!-- ================================================================
       主容器
       ================================================================ -->
  <div class="max-w-[640px] mx-auto px-4 py-6">

    <!-- ============================================================
         头部标题区
         ============================================================ -->
    <header class="text-center mb-8">
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">
        🎯 AI 职场嘴替工具箱
      </h1>
      <p class="text-gray-500 text-sm sm:text-base">告别尴尬，AI 帮你说话</p>
    </header>

    <!-- ============================================================
         场景选择区
         ============================================================ -->
    <section id="sceneSection" class="mb-6">
      <h2 class="text-sm font-semibold text-gray-600 mb-3 flex items-center gap-1.5">
        <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        选择沟通场景
      </h2>
      <div id="sceneGrid" class="grid grid-cols-2 sm:grid-cols-4 gap-2.5">
        <!-- 场景按钮由 JS 动态渲染 -->
      </div>

      <!-- 自定义场景入口 -->
      <div class="mt-2.5">
        <div id="customSceneToggle" class="scene-btn flex items-center justify-center gap-1.5 py-2.5 px-3 rounded-xl border-2 border-dashed border-gray-300 text-gray-500 text-sm cursor-pointer hover:border-indigo-400 hover:text-indigo-600 bg-white">
          <span class="text-lg leading-none">+</span>
          <span>自定义场景</span>
        </div>
        <div id="customSceneInput" class="custom-scene-input hidden mt-2">
          <div class="flex gap-2">
            <input id="customSceneName" type="text" placeholder="输入自定义场景名称，如：和老板谈远程办公" class="flex-1 px-3 py-2.5 rounded-xl border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" maxlength="30">
            <button id="confirmCustomScene" class="px-4 py-2.5 bg-indigo-600 text-white text-sm rounded-xl hover:bg-indigo-700 transition-colors whitespace-nowrap">确定</button>
            <button id="cancelCustomScene" class="px-3 py-2.5 bg-gray-100 text-gray-600 text-sm rounded-xl hover:bg-gray-200 transition-colors">取消</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         热门场景排行
         ============================================================ -->
    <section id="statsSection" class="mb-6 hidden">
      <div class="stats-card">
        <div id="statsToggle" class="stats-toggle">
          <span>🔥 热门场景</span>
          <span id="statsArrow" class="arrow">▼</span>
        </div>
        <div id="statsList" class="stats-list">
          <!-- 排行项由 JS 动态渲染 -->
        </div>
      </div>
    </section>

    <!-- ============================================================
         情境输入区
         ============================================================ -->
    <section id="inputSection" class="mb-4">
      <h2 class="text-sm font-semibold text-gray-600 mb-3 flex items-center gap-1.5">
        <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        描述你的情境
      </h2>
      <div class="relative">
        <textarea
          id="situationInput"
          rows="4"
          class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none transition-shadow"
          placeholder="例：我在公司工作了2年，承担了更多责任，想和领导谈加薪"
          maxlength="500"
        ></textarea>
        <span id="charCount" class="absolute bottom-3 right-3 text-xs text-gray-400">0/500</span>
      </div>
    </section>

    <!-- ============================================================
         示例快速填入区
         ============================================================ -->
    <section id="exampleSection" class="mb-6">
      <div class="flex flex-wrap gap-2" id="exampleButtons">
        <!-- 示例按钮由 JS 动态渲染 -->
      </div>
    </section>

    <!-- ============================================================
         语气选择区
         ============================================================ -->
    <section id="toneSection" class="mb-6">
      <h2 class="text-sm font-semibold text-gray-600 mb-3 flex items-center gap-1.5">
        <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        选择语气风格
      </h2>
      <div id="toneButtons" class="flex flex-wrap gap-2">
        <!-- 4个语气按钮由JS渲染 -->
      </div>
    </section>

    <!-- ============================================================
         话术展示区
         ============================================================ -->
    <section id="resultSection" class="mb-6">
      <div id="resultCard" class="result-card bg-white rounded-2xl shadow-sm border border-gray-100 p-5 min-h-[120px]">
        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-6">
          <div class="text-4xl mb-3">✨</div>
          <p class="text-gray-400 text-sm">选择场景、描述情境，AI 为你生成高情商话术</p>
        </div>
        <!-- 生成结果 -->
        <div id="resultContent" class="hidden">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-medium text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full" id="resultSceneTag">话术结果</span>
            <span id="resultWordCount" class="text-xs text-gray-400"></span>
          </div>
          <div id="resultText" class="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap"></div>
          <!-- 温馨提示 -->
          <div class="mt-4 pt-3 border-t border-gray-100">
            <p class="text-xs text-gray-400 flex items-start gap-1.5">
              <span>💡</span>
              <span>温馨提示：话术仅供参考，请根据实际情况灵活调整，保持真诚最重要。</span>
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         操作按钮区
         ============================================================ -->
    <section id="actionSection" class="mb-8">
      <div class="flex gap-3">
        <button
          id="generateBtn"
          class="generate-btn flex-1 py-3 px-6 bg-indigo-600 text-white font-medium rounded-xl hover:bg-indigo-700 transition-all text-sm flex items-center justify-center gap-2"
          aria-label="生成话术"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
          <span id="generateBtnText">生成话术</span>
        </button>
        <button
          id="copyBtn"
          class="py-3 px-5 bg-white border border-gray-200 text-gray-600 rounded-xl hover:bg-gray-50 transition-all text-sm flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed"
          disabled
        >
          <svg id="copyIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          <span id="copyBtnText">复制</span>
        </button>
        <button
          id="regenerateBtn"
          class="py-3 px-5 bg-white border border-gray-200 text-gray-600 rounded-xl hover:bg-gray-50 transition-all text-sm flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed"
          disabled
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
          <span>重新生成</span>
        </button>
        <button
          id="likeBtn"
          class="like-btn py-3 px-5 bg-white border border-gray-200 text-gray-600 rounded-xl hover:bg-gray-50 transition-all text-sm flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed"
          disabled
          aria-label="点赞这条话术"
        >
          <span>👍</span>
          <span id="likeBtnText">点赞</span>
          <span id="likeCount" class="text-xs"></span>
        </button>
      </div>

    </section>

    <!-- ============================================================
         场景征集
         ============================================================ -->
    <section id="suggestSection" class="mb-6">
      <div class="suggest-area">
        <p class="text-sm text-gray-600 font-medium mb-3">
          💡 你还想要什么场景？<span id="suggestCount" class="text-xs text-gray-400 font-normal"></span>
        </p>
        <div class="flex gap-2">
          <input id="suggestInput" type="text" placeholder="输入你想要的场景，如：和甲方催款" maxlength="100">
          <button id="suggestBtn" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 transition-colors whitespace-nowrap">提交建议</button>
        </div>
      </div>
    </section>

    <!-- 建议提交模态框 -->
    <div id="suggestModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm">
      <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md mx-4 transform transition-all">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold text-gray-800">💡 提交场景建议</h3>
          <button id="suggestModalClose" class="text-gray-400 hover:text-gray-600 transition-colors text-xl leading-none" aria-label="关闭">&times;</button>
        </div>
        <div class="space-y-3">
          <div>
            <label class="block text-sm text-gray-600 mb-1">建议内容 <span class="text-red-400">*</span></label>
            <textarea id="suggestTextarea" rows="3" maxlength="200" placeholder="你希望增加什么职场沟通场景？如：和甲方催款、面试自我介绍..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"></textarea>
            <p class="text-xs text-gray-400 mt-1 text-right"><span id="suggestCharCount">0</span>/200</p>
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">联系方式 <span class="text-gray-400">(可选)</span></label>
            <input id="suggestContact" type="text" maxlength="50" placeholder="微信号/邮箱，方便我们联系你" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
          </div>
          <button id="suggestSubmitBtn" class="w-full py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium text-sm">
            提交建议
          </button>
        </div>
      </div>
    </div>

    <!-- ============================================================
         底部标识
         ============================================================ -->
    <footer class="text-center py-6 border-t border-gray-100">
      <p class="text-xs text-gray-400">
        Powered by <span class="font-semibold text-gray-500">TRAE SOLO</span> &middot; AI by <span class="font-semibold text-gray-500">MiniMax</span>
      </p>
      <p class="text-xs text-gray-300 mt-2">觉得好用？分享给你的职场搭子 👇</p>
    </footer>

  </div>

  <!-- ================================================================
       JavaScript - 全部逻辑
       ================================================================ -->
  <script>
    // ================================================================
    // 数据定义
    // ================================================================

    /** 8大场景数据 */

      /** 渲染场景按钮 */
      renderSceneButtons() {
        $sceneGrid.innerHTML = '';
        SCENES.forEach(scene => {
          const btn = document.createElement('button');
          btn.className = 'scene-btn flex flex-col items-center gap-1.5 py-3 px-2 rounded-xl border-2 border-gray-200 bg-white text-gray-700 text-xs sm:text-sm cursor-pointer';
          btn.dataset.sceneId = scene.id;
          // 使用 textContent 避免 XSS（H4 修复）
          const iconSpan = document.createElement('span');
          iconSpan.className = 'text-xl sm:text-2xl';
          iconSpan.textContent = scene.icon;
          const nameSpan = document.createElement('span');
          nameSpan.className = 'font-medium';
          nameSpan.textContent = scene.name;
          btn.appendChild(iconSpan);
          btn.appendChild(nameSpan);
          btn.addEventListener('click', () => this.selectScene(scene));
          $sceneGrid.appendChild(btn);
        });
      },

      /** 选中某个场景 */
      selectScene(scene) {
        // BUG#4修复：生成中不允许切换场景，防止统计记录到错误场景
        if (isGenerating) return;
        currentScene = scene;

        // 更新按钮高亮
        document.querySelectorAll('.scene-btn').forEach(btn => {
          btn.classList.remove('active');
          if (btn.dataset.sceneId === scene.id) {
            btn.classList.add('active');
            // A3: 添加 scale 切换动画
            btn.classList.remove('btn-scale-anim');
            // 触发 reflow 以重新播放动画
            void btn.offsetWidth;
            btn.classList.add('btn-scale-anim');
          }
        });

        // 更新输入框 placeholder（保留已有内容）
        $situationInput.placeholder = scene.placeholder;

        // 更新示例按钮
        InputModule.renderExamples(scene.examples);

        // 关闭自定义场景输入
        $customSceneInput.classList.add('hidden');
        $customSceneToggle.classList.remove('hidden');
      },

      /** 初始化自定义场景 */
      initCustomScene() {
        $customSceneToggle.addEventListener('click', () => {
          $customSceneToggle.classList.add('hidden');
          $customSceneInput.classList.remove('hidden');
          $customSceneName.focus();
        });

        $cancelCustomScene.addEventListener('click', () => {
          $customSceneInput.classList.add('hidden');
          $customSceneToggle.classList.remove('hidden');
          $customSceneName.value = '';
        });

        $confirmCustomScene.addEventListener('click', () => {
          const name = $customSceneName.value.trim();
          if (!name) {
            $customSceneName.focus();
            return;
          }
          // 创建自定义场景对象
          const customScene = {
            id: 'custom_' + Date.now(),
            name: name,
            icon: '✏️',
            placeholder: `例：关于「${name}」，我想说...`,
            examples: [`关于${name}，我遇到了一些困难需要沟通`, `想就${name}这个话题和对方进行有效沟通`, `在${name}的场景下，我需要一段得体的表达`],
          };
          // BUG#22修复：给自定义场景按钮添加高亮样式
          $customSceneToggle.classList.add('active', 'border-indigo-500', 'bg-indigo-50', 'text-indigo-700');
          $customSceneToggle.classList.remove('border-gray-300', 'text-gray-500');
          $customSceneToggle.textContent = '✏️ ' + name;
          this.selectScene(customScene);
        });

        // 回车确认
        $customSceneName.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            $confirmCustomScene.click();
          }
          if (e.key === 'Escape') {
            $cancelCustomScene.click();
          }
        });
      },

      /** 初始化模块 */
      init() {
        this.renderSceneButtons();

        const label = document.createElement('span');
        label.className = 'text-xs text-gray-400 self-center';
        label.textContent = '快速填入：';
        $exampleButtons.appendChild(label);

        examples.forEach(text => {
          const btn = document.createElement('button');
          btn.className = 'example-btn text-xs px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 bg-white cursor-pointer truncate max-w-[200px]';
          btn.textContent = text;
          btn.title = text;
          btn.addEventListener('click', () => {
            $situationInput.value = text;
            this.updateCharCount();
            $situationInput.focus();
          });
          $exampleButtons.appendChild(btn);
        });
      },

      /** 更新字数统计 */
      updateCharCount() {
        const len = $situationInput.value.length;
        $charCount.textContent = `${len}/500`;
        if (len > 450) {
          $charCount.classList.add('text-red-400');
        } else {
          $charCount.classList.remove('text-red-400');
        }
      },

      /** 初始化模块 */
      init() {
        $situationInput.addEventListener('input', () => this.updateCharCount());
        // 初始渲染默认场景的示例
        this.renderExamples(SCENES[0].examples);
      }
    };

    // ================================================================
    // AIModule - AI 话术生成模块
    // ================================================================

    const AIModule = {
      /** 构建 System Prompt */
      getSystemPrompt() {
        return '你是一位拥有10年经验的职场沟通教练，精通各类职场场景的高情商表达。你的风格是：专业但不生硬，温暖但不谄媚，坚定但不冒犯。重要：请直接输出话术内容，不要输出任何思考过程、分析过程或解释说明，不要使用<think沉思>标签。';
      },

      /**
       * 过滤 MiniMax 模型返回的思考标签（彻底方案 v5）
       * 
       * 已知格式（全部实测确认）：
       * 1. <think沉思>...</think沉思>（中文XML标签版）
       * 2. <think沉思>...（未闭合，流式中）
       * 3. <think>...</think>（英文XML标签版，截图确认）
       * 4. <think>...（未闭合英文版）
       * 5. <think...>...</think >（其他变体）
       * 6. 💭...💭/💤/💡（emoji版，各种结束标记）
       * 7. 💭...（只有开头，流式中断）
       * 
       * 策略：循环过滤直到没有think标签为止，再处理emoji版
       * 
       * @param {string} text - 包含可能的 think 标签的文本
       * @returns {string} 过滤后的纯话术文本
       */
      _filterThinkTags(text) {
        let originalText;
        let maxIterations = 10;
        
        // ===== 第一步：循环删除所有 <think...>...</think...> XML标签块 =====
        // 循环处理，确保嵌套或多个标签都被删除
        do {
          originalText = text;
          
          // 匹配 <think...> 到 </think...> 之间的所有内容（贪婪匹配）
          // 修复：确保所有变体都匹配，包括 <think>, <think沉思>, <think_xxx> 等
          text = text.replace(/<think[^>]*>[\s\S]*?<\/think\s*>/gi, '');
          
          // 匹配未闭合的 <think...>...（流式中可能尚未闭合）
          text = text.replace(/<think[^>]*>[\s\S]*/gi, '');
          
          maxIterations--;
        } while (text !== originalText && maxIterations > 0);

        // ===== 第二步：处理 emoji 版思考块（💭 U+1F4AD） =====
        const THINK = '\u{1F4AD}';

        if (!text.includes(THINK)) {
          return text;
        }

        const thinkStart = text.indexOf(THINK);

        if (thinkStart > 0) {
          // 💭在中间：截断从💭到末尾
          text = text.substring(0, thinkStart);
        } else {
          // 💭在开头：找到结束emoji标记行，删除从开头到该行
          const lines = text.split('\n');
          let endLineIdx = -1;

          for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line === '') continue;
            // 检查是否是纯emoji标记行（1-3个emoji字符，无其他文字）
            const isEmojiMarker = /^[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]{1,3}$/u.test(line);
            if (isEmojiMarker) {
              endLineIdx = i;
              break;
            }
          }

          if (endLineIdx !== -1) {
            text = lines.slice(endLineIdx + 1).join('\n');
          } else {
            // 没有找到结束标记（流式中），清空
            text = '';
          }
        }

        // ===== 第三步：检测 prompt 复述 / 非话术内容 =====
        // MiniMax M2.7 在 enable_thinking:false 时可能直接把 prompt 复述作为输出
        // 这种情况下整个输出都是垃圾数据，应全部清空走降级
        // 检测特征：以"一段XX的话术"、"请生成"、"当前场景"、"我需要写"等开头
        const junkPatterns = [
          /^一段[\s\S]{0,30}话术/,
          /^请生成[\s\S]{0,30}话术/,
          /^当前场景[：:]/,
          /^用户情境[：:]/,
          /^我需要写/,
          /^我需要生成/,
        ];
        const isJunk = junkPatterns.some(p => p.test(text));
        if (isJunk) {
          text = '';
        }

        // ===== 第四步：清理残留 =====
        text = text.replace(/^\s*\n+/, '');
        return text;
      },

      /** 构建 User Prompt（M5 修复：预留 tone 参数） */
      getUserPrompt(sceneName, userInput, tone = '') {
        let prompt = `当前场景：${sceneName}\n用户情境：${userInput}\n请生成一段80-200字的职场话术，要求：1. 表达清晰自然，口语化 2. 符合职场礼仪 3. 直接输出话术内容，不添加前缀 4. 如涉及具体数据用XX占位`;
        if (tone) {
          prompt += `\n5. 语气风格：${tone}`;
        }
        return prompt;
      },

      /**
       * 流式调用 AI 接口
       * @param {string} sceneName - 场景名称
       * @param {string} userInput - 用户输入的情境
       * @param {string} toneRule - 语气规则描述
       * @param {function} onChunk - 每收到一段文本的回调
       * @param {function} onDone - 完成回调
       * @param {function} onError - 错误回调
       */
      async streamGenerate(sceneName, userInput, toneRule, onChunk, onDone, onError) {
        abortController = new AbortController();

        const body = {
          model: API_CONFIG.model,
          messages: [
            { role: 'system', content: this.getSystemPrompt() },
            { role: 'user', content: this.getUserPrompt(sceneName, userInput, toneRule) },
          ],
          stream: true,
          temperature: 0.8,
          max_tokens: 512,
          // 彻底禁用模型思考过程（MiniMax M2.7 支持）
          // 不设置 enable_thinking 或设为 false 可禁用 <think沉思> 和 💭 思考输出
          enable_thinking: false,
        };

        // 5秒超时自动降级
        let timeoutTriggered = false;
        const timeoutId = setTimeout(() => {
          timeoutTriggered = true;
          abortController.abort();
        }, 5000);

        try {
          const response = await fetch(API_CONFIG.url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${API_CONFIG.apiKey}`,
            },
            body: JSON.stringify(body),
            signal: abortController.signal,
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
          }

          // 使用 ReadableStream 读取 SSE 数据
          const reader = response.body.getReader();
          const decoder = new TextDecoder('utf-8');
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });

            // 按行解析 SSE 数据
            const lines = buffer.split('\n');
            buffer = lines.pop() || ''; // 保留不完整的行

            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed || trimmed === 'data: [DONE]') continue;
              if (!trimmed.startsWith('data: ')) continue;

              try {
                const json = JSON.parse(trimmed.slice(6));
                // 只取正式内容，忽略 reasoning_content（思考过程）
                const delta = json.choices?.[0]?.delta?.content;
                if (delta) {
                  onChunk(delta);
                }
                // 注意：json.choices[0].delta.reasoning_content 是思考过程，故意不处理
              } catch (e) {
                // JSON 解析失败，跳过这一行
                continue;
              }
            }
          }

          onDone();
        } catch (error) {
          if (error.name === 'AbortError') {
            if (timeoutTriggered) {
              // 阶段7紧急修复：超时后检查结果内容是否有效
              // 如果结果太短（<20字），说明模型只返回了思考标签或未完成，应清空并降级
              const filteredResult = this._filterThinkTags(currentResult || '');
              if (filteredResult.length < 20) {
                currentResult = '';
                $resultText.textContent = '';
              }
              onError(new Error('AI 响应超时（5秒），请检查网络后重试'));
            } else {
              // 用户主动取消，恢复状态但不报错
              // BUG#24修复：检查requestId，防止取消后立即重新生成时旧回调干扰新状态
              if (currentRequestId !== requestId) return;
              $resultText.classList.remove('typing-cursor');
              this.setGeneratingState(false);
              isGenerating = false;
            }
          } else {
            onError(error);
          }
        } finally {
          // M10 修复：统一在 finally 中清除超时定时器
          clearTimeout(timeoutId);
        }
      },

      /** 开始生成话术 */
      async generate() {
        // 阶段7修复：提前锁定状态，防止竞态条件
        if (isGenerating) return;

        isGenerating = true;

        // BUG#2修复：递增请求ID，旧回调通过比对ID判断是否过期
        const currentRequestId = ++requestId;
        // BUG#4/#16修复：保存场景快照，回调中使用快照而非全局变量
        const sceneSnapshot = currentScene;
        const toneSnapshot = currentTone;
        // 重置垃圾检测标志
        _junkDetected = false;

        const userInput = $situationInput.value.trim();
        if (!userInput) {
          isGenerating = false; // 校验失败，释放锁
          $situationInput.focus();
          $situationInput.classList.add('ring-2', 'ring-red-300');
          setTimeout(() => $situationInput.classList.remove('ring-2', 'ring-red-300'), 1500);
          return;
        }

        if (!currentScene) {
          // 默认选中第一个场景
          SceneModule.selectScene(SCENES[0]);
        }

        // 断网时直接走降级逻辑，不等待超时
        if (NetworkModule.isOffline) {
          isGenerating = false; // 降级不经过API，释放锁
          currentResult = '';
          $emptyState.classList.add('hidden');
          $resultContent.classList.remove('hidden');
          $resultSceneTag.textContent = sceneSnapshot.icon + ' ' + sceneSnapshot.name + ' \u00B7 ' + toneSnapshot.name;
          $resultText.textContent = '';
          $resultWordCount.textContent = '';
          // BUG#23修复：降级中禁用复制/重新生成按钮
          $copyBtn.disabled = true;
          $regenerateBtn.disabled = true;
          const sceneId = sceneSnapshot ? sceneSnapshot.id : null;
          FallbackModule.fallback(sceneId, toneSnapshot.id);
          StatsModule.record(sceneId);
          // BUG#19修复：离线降级不消耗限流配额（不走API）

          return;
        }

        currentResult = '';
        // BUG#11修复：清除可能残留的打字机定时器
        if (FallbackModule._typewriterTimer) {
          clearInterval(FallbackModule._typewriterTimer);
          FallbackModule._typewriterTimer = null;
        }
        // BUG#21修复：清除可能残留的错误样式
        $resultText.classList.remove('text-red-500');
        this.setGeneratingState(true);

        // 禁用点赞按钮
        LikeModule.setEnabled(false);

        // 显示结果区域
        $emptyState.classList.add('hidden');
        $resultContent.classList.remove('hidden');
        $resultSceneTag.textContent = currentScene.icon + ' ' + currentScene.name + ' \u00B7 ' + currentTone.name;
        $resultText.textContent = '';
        $resultText.classList.add('typing-cursor');
        $resultWordCount.textContent = '';

        // BUG#26修复：使用场景快照而非全局变量，保持一致性
        const sceneName = sceneSnapshot.name;
        const toneRule = toneSnapshot.rule;

        await this.streamGenerate(
          sceneName,
          userInput,
          toneRule,
          // onChunk: 每收到一段文本
          (chunk) => {
            // BUG#27修复：检查requestId，防止旧请求的chunk写入新请求的结果
            if (currentRequestId !== requestId) return;

            // 垃圾内容检测：一旦检测到垃圾，丢弃后续chunk直到正式内容出现
            if (_junkDetected) {
              // 检查当前chunk是否包含正式话术的开始标志
              // 正式话术特征：以称呼/礼貌用语开头（领导、您好、感谢等）
              const formalStart = /^(领导|您好|感谢|你好|老师|老板|XX|尊敬的|亲爱的)/;
              if (formalStart.test(chunk)) {
                // 检测到正式内容，重置标志并开始累积
                _junkDetected = false;
                currentResult = chunk;
              } else {
                // 仍然是垃圾内容，丢弃
                return;
              }
            } else {
              currentResult += chunk;
            }

            // 过滤思考标签
            const filtered = this._filterThinkTags(currentResult);
            if (filtered !== currentResult) {
              // 过滤后内容变少，说明检测到垃圾，设置标志
              _junkDetected = true;
              currentResult = filtered;
            }

            $resultText.textContent = currentResult;
            // 更新字数
            $resultWordCount.textContent = `${currentResult.length} 字`;
          },
          // onDone: 生成完成
          () => {
            // BUG#2修复：检查请求ID，忽略过期回调
            if (currentRequestId !== requestId) return;
            
            // ===== 最终过滤：确保万无一失 =====
            // 即使在流式输出中已经过滤过，这里再做一次最终过滤
            currentResult = this._filterThinkTags(currentResult);
            $resultText.textContent = currentResult;
            $resultWordCount.textContent = `${currentResult.length} 字`;
            
            $resultText.classList.remove('typing-cursor');
            this.setGeneratingState(false);
            isGenerating = false;
            $copyBtn.disabled = false;
            $regenerateBtn.disabled = false;
            // 启用点赞按钮
            LikeModule.setEnabled(true);
            // BUG#16修复：使用场景快照记录统计
            if (sceneSnapshot) {
              StatsModule.record(sceneSnapshot.id);
            }
          },
          // onError: 出错
          (error) => {
            // BUG#2修复：检查请求ID，忽略过期回调
            if (currentRequestId !== requestId) return;
            $resultText.classList.remove('typing-cursor');
            this.setGeneratingState(false);
            isGenerating = false;

            // 始终启用重新生成按钮，让用户可以重试
            $regenerateBtn.disabled = false;

            if (currentResult) {
              // 已有部分内容，保留并允许复制
              $copyBtn.disabled = false;
              // 启用点赞按钮
              LikeModule.setEnabled(true);
              // BUG#16修复：使用场景快照记录统计
              if (sceneSnapshot) {
                StatsModule.record(sceneSnapshot.id);
              }
            } else {
              // 完全失败，使用 ErrorMapModule 显示友好错误
              const friendlyMsg = ErrorMapModule.getFriendlyMessage(error);

              // 尝试降级到预设话术
              const sceneId = sceneSnapshot ? sceneSnapshot.id : null;
              FallbackModule.fallback(sceneId, toneSnapshot.id);

              // 降级话术已展示，错误信息通过console输出即可
              console.warn(`[Fallback] API失败已降级 | ${friendlyMsg} | time=${new Date().toISOString()}`);

              // 记录场景使用次数（降级也算使用）
              // BUG#25修复：使用场景快照而非全局变量，保持一致性
              if (sceneSnapshot) {
                StatsModule.record(sceneSnapshot.id);
              }
            }
          }
        );
      },

      /** 设置生成中的 UI 状态 */
      setGeneratingState(generating) {
        if (generating) {
          $generateBtn.disabled = false; // 保持可点击，用于取消
          $generateBtnText.textContent = '取消生成';
          $generateBtn.setAttribute('aria-label', '取消生成');
          // 移除原来的 loading 动画定时器（如果有）
          if (loadingTimer) {
            clearInterval(loadingTimer);
            loadingTimer = null;
          }
          // 生成中点击按钮变为取消操作
          $generateBtn.onclick = () => CancelModule.cancel();
          $copyBtn.disabled = true;
          $regenerateBtn.disabled = true;
          LikeModule.setEnabled(false);
        } else {
          $generateBtn.disabled = false;
          $generateBtnText.textContent = '生成话术';
          $generateBtn.setAttribute('aria-label', '生成话术');
          if (loadingTimer) {
            clearInterval(loadingTimer);
            loadingTimer = null;
          }
          // 恢复生成按钮的原始点击事件
          $generateBtn.onclick = () => this.generate();
        }
      },

      /** 初始化模块 */
      init() {
        $generateBtn.onclick = () => this.generate();
        $regenerateBtn.addEventListener('click', () => this.generate());
      }
    };

    // ================================================================
    // CopyModule - 复制功能模块
    // ================================================================

    const CopyModule = {
      /** 一键复制（三级兼容） */
      async copy() {
        if (!currentResult) return;

        const text = currentResult;

        // 第一级：navigator.clipboard.writeText（需要 HTTPS 或 localhost）
        if (navigator.clipboard && window.isSecureContext) {
          try {
            await navigator.clipboard.writeText(text);
            this.showCopySuccess();
            return;
          } catch (e) {
            // 降级到第二级
          }
        }

        // 第二级：document.execCommand('copy')
        try {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.position = 'fixed';
          textarea.style.left = '-9999px';
          textarea.style.top = '-9999px';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          const success = document.execCommand('copy');
          document.body.removeChild(textarea);
          if (success) {
            this.showCopySuccess();
            return;
          }
        } catch (e) {
          // 降级到第三级
        }

        // 第三级：提示手动复制
        this.showManualCopyHint();
      },

      /** 显示复制成功状态 */
      showCopySuccess() {
        $copyBtnText.textContent = '已复制 ✓';
        $copyBtn.classList.add('!text-green-600', '!border-green-300', '!bg-green-50');
        setTimeout(() => {
          $copyBtnText.textContent = '复制';
          $copyBtn.classList.remove('!text-green-600', '!border-green-300', '!bg-green-50');
        }, 2000);
      },

      /** 显示手动复制提示 */
      showManualCopyHint() {
        // 选中结果文本
        const range = document.createRange();
        range.selectNodeContents($resultText);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);

        $copyBtnText.textContent = '请手动复制';
        setTimeout(() => {
          $copyBtnText.textContent = '复制';
          selection.removeAllRanges();
        }, 3000);
      },

      /** 初始化模块 */
      init() {
        $copyBtn.addEventListener('click', () => this.copy());
      }
    };

    // ================================================================
    // ToneModule - 语气切换模块
    // ================================================================

    const ToneModule = {
      /** 渲染语气按钮 */
      renderToneButtons() {
        const $toneButtons = document.getElementById('toneButtons');
        $toneButtons.innerHTML = '';
        TONES.forEach(tone => {
          const btn = document.createElement('button');
          btn.className = 'text-xs px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 bg-white cursor-pointer transition-all';
          btn.dataset.toneId = tone.id;
          btn.title = tone.desc;
          btn.textContent = tone.icon + ' ' + tone.name;
          // 默认选中第一个（温和）
          if (tone.id === currentTone.id) {
            btn.classList.remove('border-gray-200', 'text-gray-500', 'bg-white');
            btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
          }
          btn.addEventListener('click', () => this.selectTone(tone));
          $toneButtons.appendChild(btn);
        });
      },

      /** 选中某个语气 */
      selectTone(tone) {
        if (isGenerating) return; // 生成中不允许切换
        currentTone = tone;

        // 更新按钮高亮
        document.querySelectorAll('#toneButtons button').forEach(btn => {
          if (btn.dataset.toneId === tone.id) {
            btn.classList.remove('border-gray-200', 'text-gray-500', 'bg-white');
            btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
            // A3: 添加 scale 切换动画
            btn.classList.remove('btn-scale-anim');
            void btn.offsetWidth;
            btn.classList.add('btn-scale-anim');
          } else {
            btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
            btn.classList.add('border-gray-200', 'text-gray-500', 'bg-white');
          }
        });

        // 如果已有生成内容，自动重新生成
        if (currentResult && !isGenerating) {
          // 阶段7修复：清空旧结果，避免onError路径判断异常
          currentResult = '';
          AIModule.generate();
        }
      },

      /** 初始化模块 */
      init() {
        this.renderToneButtons();
      }
    };

    // ================================================================
    // FallbackModule - 预设话术降级模块
    // ================================================================

    const FallbackModule = {
      _typewriterTimer: null, // 阶段7修复：保存打字机定时器引用，防止快速操作导致冲突

      /**
       * 获取预设降级话术
       * @param {string} sceneId - 场景ID
       * @param {string} toneId - 语气ID
       * @returns {string|null} 预设话术，找不到则返回null
       */
      getFallbackText(sceneId, toneId) {
        // 自定义场景：根据语气生成通用降级话术
        if (!sceneId || sceneId.startsWith('custom_')) {
          const sceneName = currentScene ? currentScene.name : '这个场景';
          const toneTexts = {
            gentle: `关于${sceneName}，我想和您坦诚地沟通一下。我理解您的想法，也希望能找到一个双方都满意的方案。方便的话，我们可以找个时间详细聊聊？`,
            firm: `关于${sceneName}，我需要明确表达我的想法。经过认真考虑，我认为这样做对双方都更有利。希望您能理解我的立场。`,
            concise: `关于${sceneName}，我想简单说几点：第一，我的诉求是XX；第二，希望能在XX时间内得到回复；第三，期待我们能达成一致。`,
            humorous: `关于${sceneName}，说真的，这个问题困扰我挺久了。不过我相信以我们的默契，一定能找到好办法。要不我们先喝杯咖啡慢慢聊？`,
          };
          return toneTexts[toneId] || toneTexts.gentle;
        }
        const sceneTexts = FALLBACK_TEXTS[sceneId];
        if (!sceneTexts) return null;
        return sceneTexts[toneId] || null;
      },

      /**
       * 使用模拟打字机效果展示预设话术
       * @param {string} text - 要展示的文本
       * @param {function} onComplete - 完成回调
       */
      typewriterShow(text, onComplete) {
        // 阶段7修复：清除旧的打字机定时器，防止快速操作导致冲突
        if (this._typewriterTimer) {
          clearInterval(this._typewriterTimer);
          this._typewriterTimer = null;
        }
        currentResult = '';
        $resultText.textContent = '';
        $resultText.classList.add('typing-cursor');

        let index = 0;
        this._typewriterTimer = setInterval(() => {
          if (index < text.length) {
            currentResult += text[index];
            $resultText.textContent = currentResult;
            $resultWordCount.textContent = `${currentResult.length} 字`;
            index++;
          } else {
            clearInterval(this._typewriterTimer);
            this._typewriterTimer = null;
            $resultText.classList.remove('typing-cursor');
            $copyBtn.disabled = false;
            $regenerateBtn.disabled = false;
            // P2 修复：降级完成后启用点赞按钮
            LikeModule.setEnabled(true);
            if (onComplete) onComplete();
          }
        }, 20); // 每字20ms
      },

      /**
       * 执行降级逻辑：展示预设话术
       * @param {string} sceneId - 场景ID
       * @param {string} toneId - 语气ID
       */
      fallback(sceneId, toneId) {
        const text = this.getFallbackText(sceneId, toneId);
        if (!text) {
          // 无法降级，显示错误提示
          $resultText.textContent = '生成失败，且无可用离线话术，请检查网络后重试。';
          $resultText.classList.add('text-red-500');
          setTimeout(() => $resultText.classList.remove('text-red-500'), 3000);
          return;
        }

        // 更新标签为"离线话术"标记
        if (currentScene) {
          $resultSceneTag.textContent = currentScene.icon + ' ' + currentScene.name + ' \u00B7 ' + currentTone.name + ' \u{1F4CB} 离线话术';
        }

        // 使用打字机效果展示
        this.typewriterShow(text);
      }
    };

    // ================================================================
    // StatsModule - 热门场景排行模块 (P2-02)
    // ================================================================

    const StatsModule = {
      STORAGE_KEY: 'wp_scene_stats',
      MAX_DISPLAY: 3,
      _renderTimer: null,

      /** 获取统计数据 */
      getStats() {
        try {
          return JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || {};
        } catch (e) {
          return {};
        }
      },

      /** 记录场景使用次数 */
      record(sceneId) {
        // BUG#5修复：null/undefined 守卫，防止脏数据
        if (!sceneId) return;
        const stats = this.getStats();
        stats[sceneId] = (stats[sceneId] || 0) + 1;
        try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(stats)); } catch(e) { /* 静默降级 */ }
        // 补充修复：render 添加 500ms 防抖，避免高频写入+渲染
        if (this._renderTimer) clearTimeout(this._renderTimer);
        this._renderTimer = setTimeout(() => this.render(), 500);
      },

      /** 渲染热门场景排行 */
      render() {
        const stats = this.getStats();
        // 过滤使用次数 > 0 的场景，按次数降序排列
        const sorted = Object.entries(stats)
          .filter(([, count]) => count > 0)
          .sort((a, b) => b[1] - a[1])
          .slice(0, this.MAX_DISPLAY);

        if (sorted.length === 0) {
          $statsSection.classList.add('hidden');
          return;
        }

        $statsSection.classList.remove('hidden');
        $statsList.innerHTML = '';

        const rankClasses = ['gold', 'silver', 'bronze'];
        sorted.forEach(([sceneId, count], index) => {
          // 查找场景信息
          const scene = SCENES.find(s => s.id === sceneId);
          if (!scene) return;

          const item = document.createElement('div');
          item.className = 'stats-item';

          const rankSpan = document.createElement('span');
          rankSpan.className = 'rank ' + (rankClasses[index] || '');
          rankSpan.textContent = index + 1;

          const iconSpan = document.createElement('span');
          iconSpan.textContent = scene.icon;

          const nameSpan = document.createElement('span');
          nameSpan.textContent = scene.name;

          const countSpan = document.createElement('span');
          countSpan.className = 'count';
          countSpan.textContent = count + '次';

          item.appendChild(rankSpan);
          item.appendChild(iconSpan);
          item.appendChild(nameSpan);
          item.appendChild(countSpan);
          $statsList.appendChild(item);
        });
      },

      /** 初始化模块 */
      init() {
        // 折叠/展开切换
        $statsToggle.addEventListener('click', () => {
          const isCollapsed = $statsList.classList.toggle('collapsed');
          $statsArrow.classList.toggle('collapsed', isCollapsed);
        });
        this.render();
      }
    };

    // ================================================================
    // LikeModule - 话术点赞模块 (P2-04)
    // ================================================================

    const LikeModule = {
      STORAGE_KEY: 'wp_likes',

      /** 获取所有点赞数据 */
      getLikes() {
        try {
          return JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || {};
        } catch (e) {
          return {};
        }
      },

      /** 生成点赞唯一key（场景ID + 语气ID + 话术内容前20字） */
      getLikeKey(sceneId, toneId, text) {
        const prefix = text.substring(0, 20);
        return `${sceneId}_${toneId}_${prefix}`;
      },

      /** 获取当前结果的点赞状态 */
      getCurrentLikeState() {
        if (!currentScene || !currentResult) return { key: null, count: 0, liked: false };
        const key = this.getLikeKey(currentScene.id, currentTone.id, currentResult);
        const likes = this.getLikes();
        const data = likes[key] || { count: 0, liked: false };
        return { key, count: data.count, liked: data.liked };
      },

      /** 切换点赞状态 */
      toggle() {
        if (!currentScene || !currentResult) return;
        const { key, count, liked } = this.getCurrentLikeState();
        const likes = this.getLikes();

        if (liked) {
          // 取消点赞
          likes[key] = { count: Math.max(0, count - 1), liked: false };
        } else {
          // 点赞
          likes[key] = { count: count + 1, liked: true };
        }

        try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(likes)); } catch(e) { /* 静默降级 */ }
        this.updateUI();
      },

      /** 更新点赞按钮UI */
      updateUI() {
        const { count, liked } = this.getCurrentLikeState();
        if (liked) {
          $likeBtn.classList.add('liked');
          $likeBtnText.textContent = '已赞';
        } else {
          $likeBtn.classList.remove('liked');
          $likeBtnText.textContent = '点赞';
        }
        $likeCount.textContent = count > 0 ? count : '';
      },

      /** 启用/禁用点赞按钮 */
      setEnabled(enabled) {
        $likeBtn.disabled = !enabled;
        if (enabled) {
          this.updateUI();
        } else {
          $likeBtn.classList.remove('liked');
          $likeBtnText.textContent = '点赞';
          $likeCount.textContent = '';
        }
      },

      /** 初始化模块 */
      init() {
        $likeBtn.addEventListener('click', () => this.toggle());
      }
    };

    // ================================================================
    // NetworkModule - 网络状态检测模块 (S1)
    // ================================================================

    const NetworkModule = {
      isOffline: false,
      onlineTimer: null,

      /** 检查当前网络状态 */
      checkOnline() {
        return navigator.onLine;
      },

      /** 显示断网提示 */
      showOffline() {
        this.isOffline = true;
        $networkBar.className = 'network-bar offline';
        $networkBarText.textContent = '⚠️ 网络已断开，将使用离线话术';
        // 补充：关键操作日志埋点
        console.warn(`[Network] 网络断开 | time=${new Date().toISOString()}`);
      },

      /** 显示恢复提示 */
      showOnline() {
        this.isOffline = false;
        $networkBar.className = 'network-bar online';
        $networkBarText.textContent = '✅ 网络已恢复';
        console.info(`[Network] 网络恢复 | time=${new Date().toISOString()}`);
        // 3秒后自动隐藏
        if (this.onlineTimer) clearTimeout(this.onlineTimer);
        this.onlineTimer = setTimeout(() => {
          $networkBar.className = 'network-bar';
        }, 3000);
      },

      /** 初始化模块 */
      init() {
        // 初始状态检查
        if (!navigator.onLine) {
          this.showOffline();
        }

        window.addEventListener('offline', () => {
          if (this.onlineTimer) clearTimeout(this.onlineTimer);
          this.showOffline();
        });

        window.addEventListener('online', () => {
          this.showOnline();
        });
      }
    };

    // ================================================================
    // ErrorMapModule - API错误码处理模块 (S4)
    // ================================================================

    const ErrorMapModule = {
      /** 错误码映射表 */
      errorMap: [
        { pattern: '401', message: 'API认证失败，请检查配置' },
        { pattern: '429', message: '请求过于频繁，请稍后再试' },
        { pattern: '500', message: 'AI服务暂时不可用，请稍后再试' },
        { pattern: '502', message: 'AI服务维护中，请稍后再试' },
        { pattern: '503', message: 'AI服务维护中，请稍后再试' },
        { pattern: '超时', message: 'AI响应超时，已切换离线话术' },
        { pattern: 'Failed to fetch', message: '网络连接失败，已切换离线话术' },
      ],

      /**
       * 根据错误信息匹配友好的错误提示
       * @param {Error} error - 原始错误对象
       * @returns {string} 友好的错误提示
       */
      getFriendlyMessage(error) {
        const msg = error.message || '';
        for (const item of this.errorMap) {
          if (msg.includes(item.pattern)) {
            // 补充：关键操作日志埋点（含错误码+上下文+时间戳）
            console.warn(`[API Error] ${item.pattern} | ${msg.substring(0, 100)} | time=${new Date().toISOString()}`);
            return item.message;
          }
        }
        // 其他错误返回通用友好消息（BUG#8修复：不返回原始msg，可能含敏感信息）
        console.error(`[API Error] 未映射错误 | ${msg.substring(0, 100)} | time=${new Date().toISOString()}`);
        return 'AI 服务暂时异常，已切换离线话术';
      },

      /**
       * 在结果区域显示错误提示
       * @param {string} message - 友好的错误信息
       */
      showError(message) {
        // 使用 textContent 避免 XSS（P2 修复）
        $resultText.textContent = '';
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = message;
        $resultText.appendChild(errorDiv);
      }
    };

    // ================================================================
    // SuggestModule - 场景征集模块 (A1)
    // 使用 FormSubmit.co 免费服务，建议直接发送到你的邮箱
    // 首次使用：访问 https://formsubmit.co/你的邮箱 激活即可
    // ================================================================

    const SuggestModule = {
      STORAGE_KEY: 'wp_user_suggestions',
      // FormSubmit token（已激活，替代真实邮箱，防爬虫抓取）
        FORMSUBMIT_EMAIL: '874ddc2eebee6a71c3cdaccecf596600',

      /** 获取已提交的建议列表（本地缓存） */
      getSuggestions() {
        try {
          return JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || [];
        } catch (e) {
          return [];
        }
      },

      /** 打开模态框 */
      openModal() {
        $suggestModal.classList.remove('hidden');
        $suggestModal.classList.add('flex');
        // 将页面输入框的内容带入模态框
        const existingText = $suggestInput.value.trim();
        $suggestTextarea.value = existingText;
        $suggestCharCount.textContent = existingText.length;
        $suggestContact.value = '';
        if (existingText) {
          $suggestContact.focus();
        } else {
          $suggestTextarea.focus();
        }
      },

      /** 关闭模态框 */
      closeModal() {
        $suggestModal.classList.add('hidden');
        $suggestModal.classList.remove('flex');
      },

      /** 提交建议到 FormSubmit.co + 本地缓存 */
      async submit() {
        const text = $suggestTextarea.value.trim();
        if (!text) {
          ToastModule.show('请输入建议内容');
          $suggestTextarea.focus();
          return;
        }
        if (text.length > 200) {
          ToastModule.show('建议内容不能超过200字');
          return;
        }

        const contact = $suggestContact.value.trim();
        const scene = currentScene ? currentScene.name : '未选择';

        // 禁用按钮防止重复提交
        $suggestSubmitBtn.disabled = true;
        $suggestSubmitBtn.textContent = '提交中...';

        try {
          // 发送到 FormSubmit.co（免费、无需注册、直接发到邮箱）
          const response = await fetch(`https://formsubmit.co/ajax/${this.FORMSUBMIT_EMAIL}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
              _subject: '🎯 AI职场嘴替 - 新场景建议',
              建议内容: text,
              联系方式: contact || '未提供',
              当前场景: scene,
              提交时间: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }),
            }),
          });

          if (response.ok) {
            // 同时保存到本地
            const suggestions = this.getSuggestions();
            suggestions.push({ text, contact, scene, time: new Date().toISOString() });
            try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(suggestions)); } catch(e) {}

            this.closeModal();
            this.updateCount();
            ToastModule.show('提交成功！感谢你的建议 🎉');
          } else {
            ToastModule.show('网络异常，请稍后再试');
          }
        } catch (e) {
          // 网络失败时仍然保存到本地
          const suggestions = this.getSuggestions();
          suggestions.push({ text, contact, scene, time: new Date().toISOString() });
          try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(suggestions)); } catch(e) {}

          this.closeModal();
          this.updateCount();
          ToastModule.show('已保存到本地，联网后将自动同步');
        } finally {
          $suggestSubmitBtn.disabled = false;
          $suggestSubmitBtn.textContent = '提交建议';
        }
      },

      /** 更新建议数量显示 */
      updateCount() {
        const count = this.getSuggestions().length;
        $suggestCount.textContent = count > 0 ? `（已有${count}条建议）` : '';
      },

      /** 初始化模块 */
      init() {
        // 原有提交按钮 → 打开模态框
        $suggestBtn.addEventListener('click', () => this.openModal());
        $suggestInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') this.openModal();
        });

        // 模态框事件
        $suggestModalClose.addEventListener('click', () => this.closeModal());
        $suggestModal.addEventListener('click', (e) => {
          if (e.target === $suggestModal) this.closeModal();
        });
        $suggestSubmitBtn.addEventListener('click', () => this.submit());
        $suggestTextarea.addEventListener('input', () => {
          $suggestCharCount.textContent = $suggestTextarea.value.length;
        });

        // ESC 关闭模态框
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && !$suggestModal.classList.contains('hidden')) {
            this.closeModal();
          }
        });

        this.updateCount();
      }
    };

    // ================================================================
    // ToastModule - 通用 Toast 提示模块
    // ================================================================

    const ToastModule = {
      toastEl: null,
      toastTimer: null,

      /** 显示 Toast 提示 */
      show(message, duration = 2500) {
        // 复用或创建 toast 元素
        if (!this.toastEl) {
          this.toastEl = document.createElement('div');
          this.toastEl.className = 'custom-toast';
          this.toastEl.setAttribute('role', 'status');
          this.toastEl.setAttribute('aria-live', 'polite');
          document.body.appendChild(this.toastEl);
        }

        if (this.toastTimer) clearTimeout(this.toastTimer);

        this.toastEl.textContent = message;
        this.toastEl.classList.add('show');

        this.toastTimer = setTimeout(() => {
          this.toastEl.classList.remove('show');
        }, duration);
      }
    };

    // ================================================================
    // CancelModule - 取消生成模块 (A2)
    // ================================================================

    const CancelModule = {
      /** 用户主动取消生成 */
      cancel() {
        if (abortController) {
          abortController.abort();
        }
        $resultText.classList.remove('typing-cursor');
        AIModule.setGeneratingState(false);
        isGenerating = false;

        // BUG#3/#18修复：取消后如果有部分内容，恢复复制/重新生成按钮
        if (currentResult) {
          $copyBtn.disabled = false;
          $regenerateBtn.disabled = false;
          LikeModule.setEnabled(true);
        } else {
          // 没有内容，显示取消提示
          $resultText.textContent = '已取消生成';
          $resultText.classList.add('text-gray-400', 'text-center');
          setTimeout(() => {
            $resultText.classList.remove('text-gray-400', 'text-center');
          }, 2000);
        }
      }
    };

    // ================================================================
    // 应用初始化
    // ================================================================

    (function init() {
      QuoteModule.init();
      SceneModule.init();
      InputModule.init();
      ToneModule.init();
      AIModule.init();
      CopyModule.init();
      // P2 互动功能模块
      StatsModule.init();
      LikeModule.init();
      NetworkModule.init();
      SuggestModule.init();

      // 默认选中第一个场景
      SceneModule.selectScene(SCENES[0]);
    })();
  </script>
</body>
</html>
